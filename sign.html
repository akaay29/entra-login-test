<!DOCTYPE html>
<html>
<head>
  <title>Signup / Login</title>
  <style>
    body { font-family: Arial; background:#f4f4f4; }
    .container {
      width: 300px;
      margin: 100px auto;
      padding: 20px;
      background: white;
      border-radius: 8px;
    }
    input, button {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Login</h2>
  <input type="email" placeholder="Email">
  <input type="password" placeholder="Password">
  <button onclick="login()">Login</button>

  <h3>Signup</h3>
  <input type="text" placeholder="Name">
  <input type="email" placeholder="Email">
  <input type="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
</div>

<script>
function login() {
  alert("Login clicked");
}

function signup() {
  alert("Signup clicked");
}
</script>

</body>
</html>
