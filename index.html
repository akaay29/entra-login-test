```html
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login Test</title>
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
      margin-top: 100px;
    }
    .box {
      background: white;
      padding: 30px;
      width: 320px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px 20px;
      margin-top: 20px;
      width: 100%;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Login Test</h2>
  <button onclick="login()">Login with Microsoft</button>
  <button onclick="logout()">Logout</button>
  <p id="status"></p>
</div>

<script>
const msalConfig = {
  auth: {
    clientId: "ff72e68e-78a2-4cd0-b5e1-c5a06d965ccd",
    authority: "https://login.microsoftonline.com/birlasoftdentalentra",
    redirectUri: "https://memberportal-blob.libertydentalplan.com/signupsignin.html"
  }
};

const msalInstance = new msal.PublicClientApplication(msalConfig);

// Handle redirect response
msalInstance.handleRedirectPromise().then(response => {
  if (response) {
    document.getElementById("status").innerText =
      "Logged in as: " + response.account.username;
  }
});

function login() {
  msalInstance.loginRedirect({
    scopes: ["user.read"]
  });
}

function logout() {
  msalInstance.logoutRedirect();
}
</script>

</body>
</html>
