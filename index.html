<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Member Portal – Sign In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: #f4f6f8;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #003366;
      color: #fff;
      padding: 16px 24px;
      text-align: center;
      font-size: 20px;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      width: 320px;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
      text-align: center;
    }

    .card h2 {
      margin-bottom: 10px;
    }

    .card p {
      color: #555;
      font-size: 14px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      cursor: pointer;
    }

    .signin {
      background: #0078d4;
      color: white;
    }

    .signup {
      background: #107c10;
      color: white;
    }

    .forgot {
      background: transparent;
      color: #0078d4;
      text-decoration: underline;
    }

    footer {
      background: #eee;
      text-align: center;
      padding: 10px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>

<body>

<header>
  Member Portal
</header>

<main>
  <div class="card">
    <h2>Welcome</h2>
    <p>Please sign in to continue</p>

    <button class="signin" onclick="signIn()">Sign In</button>
    <button class="signup" onclick="signUp()">Sign Up</button>
    <button class="forgot" onclick="forgotPassword()">Forgot Password?</button>
  </div>
</main>

<footer>
  © 2026 My Company
</footer>

<script>
  // ======= CONFIGURE THESE VALUES =======
  const tenantName = "birlasoftdentalentra";          
  const tenantId   = "36090fda-8a83-4040-8c58-7cf784511505";            
  const clientId   = "1fb450aa-a999-47a6-8a65-8486227db3fb";            

  const signupSigninFlow = "YOUR_SIGNIN_SIGNUP_FLOW"; // e.g. signup_signin
  const passwordResetFlow = "YOUR_PASSWORD_RESET_FLOW"; // e.g. password_reset
  // =====================================

  const redirectUri = window.location.origin + window.location.pathname;

  function signIn() {
    redirectToEntra(signupSigninFlow);
  }

  function signUp() {
    redirectToEntra(signupSigninFlow);
  }

  function forgotPassword() {
    redirectToEntra(passwordResetFlow);
  }

  function redirectToEntra(flow) {
    const url =
      "https://" + tenantName + ".ciamlogin.com/" +
      tenantId + "/oauth2/v2.0/authorize" +
      "?p=" + flow +
      "&client_id=" + clientId +
      "&response_type=code" +
      "&redirect_uri=" + encodeURIComponent(redirectUri) +
      "&scope=openid profile email";

    window.location.href = url;
  }
</script>

</body>
</html>
