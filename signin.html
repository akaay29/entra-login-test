<!DOCTYPE html>
<html>
<head>
  <title>My App Sign In</title>
</head>
<body>

  <h1>Welcome to My App</h1>
  <p>Please sign in to continue</p>

  <button onclick="login()">Sign In</button>

  <script>
    function login() {
      const tenant = "birlasoftdentalentra";
      const clientId = "ff72e68e-78a2-4cd0-b5e1-c5a06d965ccd";
      const redirectUri = "https://example.com/signin-callback";

      const url =
        "https://" + tenant + ".ciamlogin.com/"
        + tenant + ".onmicrosoft.com/oauth2/v2.0/authorize"
        + "?client_id=" + clientId
        + "&response_type=token"
        + "&redirect_uri=" + encodeURIComponent(redirectUri)
        + "&scope=openid email profile";

      window.location.href = url;
    }
  </script>

</body>
</html>
